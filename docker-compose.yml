# Unified local stack — Phase 5.2
# Usage (from project root):
#   docker compose up --build
#
# Requires ~8 GB RAM for Docker Desktop (Ollama + embeddings + Kafka + Chroma).
# First start pulls the Ollama model (slow); later starts reuse the ollama_data volume.

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  chroma:
    image: chromadb/chroma:0.6.3
    container_name: chroma
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    # Port 8000 is internal only — host :8000 is reserved for the API.
    expose:
      - "8000"
    healthcheck:
      # Slim images often lack curl/wget; bash /dev/tcp is enough for readiness.
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Pulling model $$OLLAMA_MODEL ..."
        ollama pull "$$OLLAMA_MODEL"
        echo "Model ready."
    restart: "no"

  producer:
    build: .
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "src/producer.py"]
    restart: unless-stopped

  consumer:
    build: .
    container_name: consumer
    depends_on:
      kafka:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    command: ["python", "src/consumer.py"]
    restart: unless-stopped

  api:
    build: .
    container_name: api
    ports:
      - "8000:8000"
    depends_on:
      chroma:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-ai-project}
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  mcp:
    build: .
    container_name: mcp
    ports:
      - "8001:8001"
    depends_on:
      chroma:
        condition: service_healthy
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      MCP_SERVER_PORT: "8001"
    command: ["python", "src/mcp_server/server.py", "--sse"]
    restart: unless-stopped

volumes:
  chroma_data:
  ollama_data:
